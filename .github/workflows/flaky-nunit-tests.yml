name: Flaky NUnit Tests

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      reset_history:
        description: 'Reset test history (use when deploying a new model or prompt version)'
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run NUnit tests
        id: test
        continue-on-error: true
        env:
          EVAL_STORAGE_PATH: ${{ github.workspace }}/eval-results
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=flaky-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-nunit-test-results
          path: TestResults/*.trx
          if-no-files-found: error

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: eval-results/reports/
          if-no-files-found: warn

      - name: Download previous test history
        if: always() && github.event.inputs.reset_history != 'true'
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            "Authorization" = "Bearer $env:GH_TOKEN"
            "Accept" = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $artifactsUrl = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/actions/artifacts?name=flaky-test-history&per_page=10"
          $response = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers -ErrorAction SilentlyContinue

          if ($response -and $response.artifacts.Count -gt 0) {
            # Find the most recent non-expired artifact from a previous run
            $artifact = $response.artifacts |
              Where-Object { $_.workflow_run.id -ne [long]$env:GITHUB_RUN_ID -and -not $_.expired } |
              Select-Object -First 1

            if ($artifact) {
              New-Item -ItemType Directory -Force -Path ./TestHistory | Out-Null
              Write-Host "Downloading history artifact $($artifact.id) from run $($artifact.workflow_run.id)"
              Invoke-WebRequest -Uri $artifact.archive_download_url -Headers $headers -OutFile ./TestHistory/history.zip
              Expand-Archive -Path ./TestHistory/history.zip -DestinationPath ./TestHistory -Force
              Remove-Item -Path ./TestHistory/history.zip -Force
              Write-Host "History downloaded successfully"
            } else {
              Write-Host "No suitable previous history artifact found"
            }
          } else {
            Write-Host "No history artifacts found — this appears to be the first run"
          }

      - name: Evaluate results with statistics
        if: always()
        id: evaluate
        shell: pwsh
        run: |
          $HISTORY_FILE = "./TestHistory/test-history.json"
          $MAX_HISTORY_RUNS = 3
          $FAILURE_THRESHOLD = 2   # failures in last N runs to be "really failed"
          $BULK_FAILURE_THRESHOLD = 2  # more than this many failures in one run → always fail

          # Load existing history
          $history = @()
          if (Test-Path $HISTORY_FILE) {
            try {
              $loaded = Get-Content $HISTORY_FILE -Raw | ConvertFrom-Json
              if ($loaded) { $history = @($loaded) }
              Write-Host "Loaded $($history.Count) previous run(s) from history"
            } catch {
              Write-Warning "Failed to parse history file: $_"
            }
          } else {
            Write-Host "No history file found — starting fresh"
          }

          # Parse current TRX file
          $trxFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE/TestResults" -Filter *.trx -Recurse | Select-Object -First 1
          $currentFailedTests = @()

          if ($trxFile) {
            [xml]$trx = Get-Content -Path $trxFile.FullName
            $namespaceManager = New-Object System.Xml.XmlNamespaceManager($trx.NameTable)
            $namespaceManager.AddNamespace("trx", "http://microsoft.com/schemas/VisualStudio/TeamTest/2010")
            $failedResults = $trx.SelectNodes("//trx:Results/trx:UnitTestResult[@outcome='Failed']", $namespaceManager)
            $currentFailedTests = @($failedResults | ForEach-Object { $_.testName })
          }

          Write-Host "Current run failed tests ($($currentFailedTests.Count)): $($currentFailedTests -join ', ')"

          $workflowShouldFail = $false
          $failureReason = ""
          $reallyFailedTests = @()
          $flakyTests = @()

          # Rule 3: bulk failure — more than BULK_FAILURE_THRESHOLD tests in a single run
          if ($currentFailedTests.Count -gt $BULK_FAILURE_THRESHOLD) {
            $workflowShouldFail = $true
            $failureReason = "Bulk failure: $($currentFailedTests.Count) tests failed in this run (threshold: >$BULK_FAILURE_THRESHOLD)"
            $reallyFailedTests = $currentFailedTests
          } else {
            # Rules 1 & 2: per-test history check
            # Consider the last (MAX_HISTORY_RUNS - 1) stored runs so that the current run
            # becomes the Nth entry and the window stays at MAX_HISTORY_RUNS total.
            $recentHistory = @($history | Select-Object -Last ($MAX_HISTORY_RUNS - 1))

            foreach ($testName in $currentFailedTests) {
              $historicFailures = @($recentHistory | Where-Object { @($_.failedTests) -contains $testName }).Count
              $totalRunsConsidered = $recentHistory.Count + 1  # +1 for current run
              $totalFailures = $historicFailures + 1            # +1 for current run

              Write-Host "Test '$testName': failed $totalFailures time(s) in last $totalRunsConsidered run(s)"

              # A single-run result always counts as a real failure (edge case from spec);
              # otherwise require at least FAILURE_THRESHOLD failures across the window.
              $isReallyFailed = ($totalRunsConsidered -eq 1) -or ($totalFailures -ge $FAILURE_THRESHOLD)

              if ($isReallyFailed) {
                $reallyFailedTests += $testName
              } else {
                $flakyTests += $testName
              }
            }

            if ($reallyFailedTests.Count -gt 0) {
              $workflowShouldFail = $true
              $failureReason = "Tests with repeated failures: $($reallyFailedTests -join ', ')"
            }
          }

          # Persist updated history (keep at most MAX_HISTORY_RUNS entries)
          $currentRun = [PSCustomObject]@{
            runId       = $env:GITHUB_RUN_ID
            timestamp   = (Get-Date -Format "o")
            failedTests = $currentFailedTests
          }
          $history = @(@($history) + @($currentRun) | Select-Object -Last $MAX_HISTORY_RUNS)

          New-Item -ItemType Directory -Force -Path ./TestHistory | Out-Null
          $history | ConvertTo-Json -Depth 5 | Set-Content -Path $HISTORY_FILE -Encoding UTF8
          Write-Host "Saved history with $($history.Count) run(s)"

          # Expose outputs for downstream steps
          Add-Content -Path $env:GITHUB_OUTPUT -Value "workflow_should_fail=$($workflowShouldFail.ToString().ToLower())"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "failure_reason=$failureReason"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "current_failed_count=$($currentFailedTests.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "really_failed_tests=$($reallyFailedTests -join ',')"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "flaky_tests=$($flakyTests -join ',')"

          Write-Host "Workflow should fail: $workflowShouldFail"
          if ($failureReason) { Write-Host "Reason: $failureReason" }
          if ($flakyTests.Count -gt 0) { Write-Host "Flaky (acceptable): $($flakyTests -join ', ')" }

      - name: Upload test history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-history
          path: TestHistory/test-history.json
          if-no-files-found: warn

      - name: Publish test summary
        if: always()
        shell: pwsh
        run: |
          $trxFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE/TestResults" -Filter *.trx -Recurse | Select-Object -First 1
          if (-not $trxFile) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Test Summary`n`nNo TRX result file was produced."
            exit 0
          }

          [xml]$trx = Get-Content -Path $trxFile.FullName
          $namespaceManager = New-Object System.Xml.XmlNamespaceManager($trx.NameTable)
          $namespaceManager.AddNamespace("trx", "http://microsoft.com/schemas/VisualStudio/TeamTest/2010")

          $counters    = $trx.SelectSingleNode("//trx:ResultSummary/trx:Counters", $namespaceManager)
          $allResults  = @($trx.SelectNodes("//trx:Results/trx:UnitTestResult", $namespaceManager))

          $workflowShouldFail = "${{ steps.evaluate.outputs.workflow_should_fail }}" -eq "true"
          $workflowStatus    = if ($workflowShouldFail) { "❌ FAILED" } else { "✅ PASSED" }
          $failureReason     = "${{ steps.evaluate.outputs.failure_reason }}"
          $flakyTests        = "${{ steps.evaluate.outputs.flaky_tests }}"

          # Load history saved by the evaluate step (already includes current run)
          $HISTORY_FILE = "./TestHistory/test-history.json"
          $history = @()
          if (Test-Path $HISTORY_FILE) {
            try {
              $loaded = Get-Content $HISTORY_FILE -Raw | ConvertFrom-Json
              if ($loaded) { $history = @($loaded) }
            } catch {}
          }
          $totalRuns = $history.Count

          # Top-level metrics table
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Test Summary"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Metric | Value |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "|--------|-------|"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Total tests | $($counters.total) |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Passed | $($counters.passed) |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Failed (this run) | $($counters.failed) |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Workflow result | $workflowStatus |"

          if ($failureReason) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "**Failure reason:** $failureReason"
          }

          if ($flakyTests) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "**Acceptable flaky tests (below statistical threshold):** $flakyTests"
          }

          # Per-test results table
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Per-test results"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Test | This run | Failures in last $totalRuns run(s) |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "|------|----------|----------------------------------|"

          foreach ($result in $allResults | Sort-Object testName) {
            $name   = $result.testName
            $failed = $result.outcome -eq "Failed"
            $status = if ($failed) { "❌ Failed" } else { "✅ Passed" }

            # Count how many of the stored runs include this test in their failedTests list
            $failCount   = @($history | Where-Object { @($_.failedTests) -contains $name }).Count
            $historyCell = if ($failed) { "$failCount / $totalRuns" } else { "—" }

            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| $name | $status | $historyCell |"
          }

      - name: Add eval reports link to summary
        if: always()
        shell: pwsh
        run: |
          $reportsDir = "$env:GITHUB_WORKSPACE/eval-results/reports"
          if (-not (Test-Path $reportsDir)) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "`n> No eval reports were produced."
            exit 0
          }

          $files = Get-ChildItem -Path $reportsDir -Filter *.html | Sort-Object Name
          if ($files.Count -eq 0) { exit 0 }

          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Eval reports"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Download the **eval-reports** artifact to browse HTML reports."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "[$($files.Count) report(s) available]($runUrl) — look for **eval-reports** in the Artifacts section below."

      - name: Fail workflow when tests fail based on statistics
        if: steps.evaluate.outputs.workflow_should_fail == 'true'
        run: exit 1
